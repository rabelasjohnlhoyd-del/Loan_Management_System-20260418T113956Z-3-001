<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Borrowers — Hiraya</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 40px; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #0f172a; color: white; }
        .risk-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .risk-Low { background: #dcfce7; color: #166534; }
        .risk-Medium { background: #fef9c3; color: #854d0e; }
        .risk-High { background: #fee2e2; color: #991b1b; }
        .score-input { width: 60px; padding: 5px; }
    </style>
</head>
<body>
    <h1>Borrower Management</h1>
    <a href="{{ url_for('officer.officer_dashboard') }}">← Back</a><br><br>

    <table>
        <thead>
            <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Risk Level</th>
                <th>Credit Score (300-850)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for b in borrowers %}
            <tr>
                <td>{{ b.full_name }}</td>
                <td>{{ b.email }}</td>
                <td><span class="risk-badge risk-{{ b.risk_level }}">{{ b.risk_level }}</span></td>
                <form action="{{ url_for('officer.update_score', user_id=b.id) }}" method="POST">
                    <td>
                        <input type="number" name="credit_score" value="{{ b.credit_score }}" class="score-input" min="300" max="850">
                    </td>
                    <td>
                        <button type="submit" style="cursor:pointer;">Update Score</button>
                    </td>
                </form>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
